project_name: hati
version: 2
git:
  tag_template: 'v{{ .Version }}'
  changelog:
    sort: asc
    filters:
      exclude:
        - '^docs:'
        - '^test:'
        - '^chore:'
        - '^refactor:'
before:
  hooks:
    - go mod tidy
builds:
  - id: linux-amd64
    goos: linux
    goarch: amd64
    env:
      - CGO_ENABLED=0
    main: ./cmd/hati
    binary: hati
    dir: dist
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    checksum:
      name_template: 'checksums.txt'
    format: binary

  - id: linux-arm64
    goos: linux
    goarch: arm64
    env:
      - CGO_ENABLED=0
    main: ./cmd/hati
    binary: hati
    dir: dist
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

  - id: darwin-amd64
    goos: darwin
    goarch: amd64
    env:
      - CGO_ENABLED=0
    main: ./cmd/hati
    binary: hati
    dir: dist
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

  - id: darwin-arm64
    goos: darwin
    goarch: arm64
    env:
      - CGO_ENABLED=0
    main: ./cmd/hati
    binary: hati
    dir: dist
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

  - id: windows-amd64
    goos: windows
    goarch: amd64
    env:
      - CGO_ENABLED=0
    main: ./cmd/hati
    binary: hati.exe
    dir: dist
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - none:*
    checksums:
      name_template: 'checksums.txt'

checksum:
  algorithm: sha256
  id: hati
  path: '**/checksums.txt'

snapshot:
  name_template: "{{ .Tag }}-next"

release:
  github:
    owner: andragon31
    name: Hati
  draft: true
  prerelease: auto
  name_template: "{{ .Tag }}"
  header: |
    ## Installation

    ### Binary
    Download the appropriate binary for your platform and add it to your PATH.

    ### From source
    ```bash
    go install github.com/andragon31/Hati@latest
    ```
  footer: |
    ## Documentation

    Visit [https://github.com/andragon31/Hati](https://github.com/andragon31/Hati) for full documentation.
